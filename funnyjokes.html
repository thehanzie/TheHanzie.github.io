<!DOCTYPE html>
<html>
<head>
    <title>Daily Joke</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
        }

        #topImage {
            width: 300px;
            height: 300px;
            object-fit: cover;
            margin-bottom: 30px;
        }

        #joke {
            font-size: 50px;
            margin-bottom: 50px;
        }

        button {
            padding: 20px 30px;
            font-size: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Top Image -->
    <img id="topImage" src="https://raw.githubusercontent.com/thehanzie/TheHanzie.github.io/images/cody.png" alt="Top Image">

    <div id="joke"></div>

    <button onclick="getJoke()">Get Another Joke</button>

    <script>
        const jokes = [
            "<b>Why don't scientists trust atoms?</b><br><i>Because they make up everything!</i>",
            "<b>What do you call a fake noodle?</b><br><i>An impasta.</i>",
            "<b>How does a penguin build its house?</b><br><i>Igloos it together.</i>",
            "<b>Why did the scarecrow win an award?</b><br><i>Because he was outstanding in his field.</i>",
            "<b>What do you call cheese that isn't yours?</b><br><i>Nacho cheese.</i>"
        ];

        function getJoke() {
            const index = Math.floor(Math.random() * jokes.length);
            document.getElementById("joke").innerHTML = jokes[index];
        }

        getJoke();
    </script>

</body>
</html>
