<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .top-image {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        h1 { color: #333; font-size: 24px; }
        #joke {
            font-size: 18px;
            color: #555;
            margin: 20px 0;
            min-height: 60px;
            font-style: italic;
        }
        button {
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover { background-color: #5a4bcf; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://raw.githubusercontent.com/thehanzie/TheHanzie.github.io/images/cody.png" alt="Joke Image" class="top-image">
    <h1>😂 Random Joke</h1>
    <p id="joke">Click the button to get a joke!</p>
    <button id="generate-btn">New Joke</button>
</div>

<script>
    const jokes = [
        "Why don't scientists trust atoms? Because they make up everything!",
        "Why did the scarecrow win an award? Because he was outstanding in his field!",
        "Why don't skeletons fight each other? They don't have the guts.",
        "What do you call a fake noodle? An impasta.",
        "How do you organize a space party? You planet.",
        "Why did the bicycle fall over? Because it was two-tired!",
        "What did one ocean say to the other ocean? Nothing, they just waved.",
        "Why was the computer cold? It left its Windows open!",
        "What do you call a bear with no teeth? A gummy bear.",
        "Why did the cookie go to the hospital? Because he felt crummy."
    ];

    const jokeDisplay = document.getElementById('joke');
    const button = document.getElementById('generate-btn');

    function getNewJoke() {
        const randomIndex = Math.floor(Math.random() * jokes.length);
        jokeDisplay.innerText = jokes[randomIndex];
    }

    button.addEventListener('click', getNewJoke);
</script>

</body>
</html>
